default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "spina_development") %>

test:
  <<: *default
  database: spina_test

production:
  <<: *default
  database: spina_production
  username: <%= ENV.fetch("DB_USERNAME", "spina") %>
  password: <%= ENV["DB_PASSWORD"] %>
